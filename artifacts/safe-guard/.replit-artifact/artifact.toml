kind = "mobile"
previewPath = "/"
title = "SafeGuard - Women's Safety"
version = "1.0.0"
id = "artifacts/safe-guard"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20270

[services.development]
run = "pnpm --filter @workspace/safe-guard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safe-guard", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/safe-guard", "run", "serve" ]

[services.env]
PORT = "20270"
BASE_PATH = "/"
